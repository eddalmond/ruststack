# RustStack Docker Compose
# Drop-in replacement for LocalStack in your test environment
#
# Usage:
#   docker-compose up -d ruststack
#   pytest tests/integration/
#   docker-compose down
#
# Or reference from your project's docker-compose.yml:
#   services:
#     ruststack:
#       image: ghcr.io/eddalmond/ruststack:latest
#       ports:
#         - "4566:4566"

version: '3.8'

services:
  ruststack:
    image: ghcr.io/eddalmond/ruststack:latest
    ports:
      - "4566:4566"
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s
